</style>

<body>

<div class="header">
  <img src="あづみのロゴ.png" alt="あづみのうえはら おとなこども歯科" style="height:72px;margin-bottom:6px">
  <p>自費診療の費用概算 ＋ 医療費控除シミュレーション</p>
  <div class="mode-toggle">
    <button class="mode-btn active" onclick="setMode('simple')" id="mode-simple">シンプル</button>
    <button class="mode-btn" onclick="setMode('compare')" id="mode-compare">3プラン比較</button>
  </div>
  <div class="header-actions">
    <button onclick="showSaveModal()">💾 保存</button>
    <button onclick="showLoadModal()">📂 読込</button>
    <button onclick="render();setTimeout(()=>window.print(),50)">🖨️ 印刷</button>
    <button onclick="resetAll()" style="border-color:rgba(255,255,255,0.5)">🔄 オールクリア</button>
  </div>
</div>

<div id="modal-root"></div>

<div class="tabs" id="tabs-container"></div>

<div class="content">

  <div id="page-quote" class="hidden"></div>
  <div id="page-deduction" class="hidden"></div>
</div>

<div id="print-estimate"></div>

<script>

const fmt = (n) => n.toLocaleString('ja-JP');
const esc = (s) => String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;');

const CATEGORIES = [
  { id:"inlay", name:"In（インレー・詰め物）", icon:"💎", items:[
    { id:"zirconia_in", name:"ジルコニアインレー", price:66000 },
    { id:"zirconia_onlay", name:"ジルコニアアンレー", price:77000 },
    { id:"emax_in", name:"e.maxインレー", price:66000 },
    { id:"emax_onlay", name:"e.maxアンレー", price:77000 },
    { id:"gold_in", name:"ゴールドインレー", price:0, note:"時価" },
    { id:"hoken_cadcam_in", name:"CAD/CAM（保険）", price:0 },
    { id:"hoken_silver_in", name:"銀歯（保険）", price:0 },
  ]},
  { id:"crown_post", name:"Cr（臼歯・被せ物）", icon:"🦷", note:"※別途コア料金 ¥11,000", items:[
    { id:"zr_ceramic_cr_post", name:"ジルコニアセラミックCr（臼歯）", price:165000 },
    { id:"zr_white_cr_post", name:"ジルコニアホワイトCr（臼歯）", price:88000 },
    { id:"emax_cr_post", name:"e.max Cr（臼歯）", price:121000 },
    { id:"zr_cr_post", name:"ジルコニアCr（臼歯）", price:121000 },
    { id:"gold_cr_post", name:"ゴールドCr（臼歯）", price:0, note:"時価" },
    { id:"hoken_cadcam_cr", name:"CAD/CAM冠（保険）", price:0 },
    { id:"hoken_silver_cr", name:"銀歯（保険）", price:0 },
    { id:"core_post", name:"コア（土台）", price:11000 },
  ]},
  { id:"crown_ant", name:"前歯（被せ物）", icon:"👑", note:"※別途コア料金 ¥11,000", items:[
    { id:"zr_ceramic_cr_ant", name:"ジルコニアセラミックCr（前歯）", price:165000 },
    { id:"zr_white_cr_ant", name:"ジルコニアホワイトCr（前歯）", price:88000 },
    { id:"zr_cr_ant", name:"ジルコニアCr（前歯）", price:121000 },
    { id:"emax_cr_ant", name:"e.max Cr（前歯）", price:121000 },
    { id:"hoken_cadcam_ant", name:"CAD/CAM冠（保険）", price:0 },
    { id:"hoken_resin_ant", name:"硬質レジン前装冠（保険）", price:0 },
    { id:"core_ant", name:"コア（土台）", price:11000 },
  ]},
  { id:"denture", name:"入れ歯（義歯）", icon:"🔧", items:[
    { id:"hoken_denture", name:"保険床（両側）", price:0 },
    { id:"nonclasp_both", name:"ノンクラスプ（両側）", price:165000 },
    { id:"nonclasp_2_4", name:"ノンクラスプ（2〜4歯）", price:110000 },
    { id:"nonclasp_1", name:"ノンクラスプ（1歯）", price:77000 },
    { id:"titanium_base", name:"チタン床", price:165000 },
    { id:"resin_base", name:"レジン床", price:55000 },
    { id:"gold_base", name:"金合金床", price:0, note:"時価" },
    { id:"metal_base", name:"金属床", price:165000 },
    { id:"denture_bite", name:"咬合採得（処置料）", price:5500 },
    { id:"denture_impression", name:"印象採得（処置料）", price:5500 },
  ]},
];
const TAX_BRACKETS = [
  {min:0,max:1950000,rate:0.05},{min:1950000,max:3300000,rate:0.10},
  {min:3300000,max:6950000,rate:0.20},{min:6950000,max:9000000,rate:0.23},
  {min:9000000,max:18000000,rate:0.33},{min:18000000,max:40000000,rate:0.40},
  {min:40000000,max:Infinity,rate:0.45},
];
const INCOME_PRESETS = [
  {value:3000000,label:"300万",rate:"5%"},{value:5000000,label:"500万",rate:"10%"},
  {value:7000000,label:"700万",rate:"20%"},{value:10000000,label:"1,000万",rate:"23%"},
  {value:15000000,label:"1,500万",rate:"33%"},
];

const STORAGE_KEY = 'azumino_dental_estimates';

// ===== Simple mode state =====
let selectedItems = [];
let annualIncome = 7000000;
let otherMedical = 0;
let insuranceReimbursement = 0;
let openCategories = {};
let customCounter = 0;
let patientName = '';
let doctorName = '';
let planDate = new Date().toISOString().slice(0, 10);
let memo = '';
let selectedTeeth = new Set();
let itemTeethMap = {};
let activeTooth = null;

// ===== Compare mode state =====
let mode = 'simple'; // 'simple' or 'compare'
let activePlan = 'platinum';
const PLANS = [
  { id: 'platinum', label: 'プラチナプラン', icon: '💎' },
  { id: 'gold', label: 'ゴールドプラン', icon: '🥇' },
  { id: 'silver', label: 'シルバープラン', icon: '🥈' },
];
let planItems = { platinum: [], gold: [], silver: [] };
let planTeethMap = { platinum: {}, gold: {}, silver: {} };
let planSelectedTeeth = { platinum: new Set(), gold: new Set(), silver: new Set() };
let planMemos = { platinum: '', gold: '', silver: '' };

let currentTab = 'estimate';

// ===== Helper accessors =====
function currentItems() { return mode === 'compare' ? planItems[activePlan] : selectedItems; }
function currentTeethMap() { return mode === 'compare' ? planTeethMap[activePlan] : itemTeethMap; }
function currentSelectedTeeth() { return mode === 'compare' ? planSelectedTeeth[activePlan] : selectedTeeth; }
function currentMemo() { return mode === 'compare' ? (planMemos[activePlan] || '') : memo; }
function setCurrentItems(v) { if (mode === 'compare') planItems[activePlan] = v; else selectedItems = v; }
function setCurrentTeethMap(v) { if (mode === 'compare') planTeethMap[activePlan] = v; else itemTeethMap = v; }
function setCurrentSelectedTeeth(v) { if (mode === 'compare') planSelectedTeeth[activePlan] = v; else selectedTeeth = v; }

// ===== 歯式図データ =====
const Q_COLORS = {UR:'#16a34a', UL:'#dc2626', LR:'#7c3aed', LL:'#0f766e'};
const Q_LABELS = {UR:'上顎右側', UL:'上顎左側', LR:'下顎右側', LL:'下顎左側'};
const TEETH_IDS = [];
['UR','UL','LR','LL'].forEach(q => { for(let n=1;n<=7;n++) TEETH_IDS.push(q+n); });

function toggleTooth(id) {
  const teeth = currentSelectedTeeth();
  const tMap = currentTeethMap();
  if (teeth.has(id)) {
    teeth.delete(id);
    Object.keys(tMap).forEach(k => {

// ===== 計算関数 =====
function getTaxRate(taxableIncome) {
  for (const b of TAX_BRACKETS) { if (taxableIncome >= b.min && taxableIncome < b.max) return b.rate; }
  return 0.45;
}
function getSalaryDeduction(income) {
  if (income <= 1625000) return 550000;
  if (income <= 1800000) return income * 0.4 - 100000;
  if (income <= 3600000) return income * 0.3 + 80000;
  if (income <= 6600000) return income * 0.2 + 440000;
  if (income <= 8500000) return income * 0.1 + 1100000;
  return 1950000;
}
function calcRefund(totalWithTax, otherMed, reimbursement, income) {
  const total = totalWithTax + otherMed;
  const net = Math.max(0, total - reimbursement);
  const taxable = Math.max(0, income - getSalaryDeduction(income) - 480000);
  const threshold = Math.min(Math.floor(taxable * 0.05), 100000);
  const ded = Math.min(Math.max(0, net - threshold), 2000000);
  const rate = getTaxRate(taxable);
  const incomeTax = Math.floor(ded * rate);
  const residentTax = Math.floor(ded * 0.10);
  return { cappedDeduction: ded, rate, incomeTax, residentTax, totalRefund: incomeTax + residentTax, taxable, threshold };
}
function getTotals() {
  const items = currentItems();
  let total = 0, count = 0;
  for (const item of items) { total += item.price * item.qty; count += item.qty; }
  return { total, count };
}
function getPlanTotal(planId) {
  let total = 0, count = 0;
  for (const item of planItems[planId]) { total += item.price * item.qty; count += item.qty; }
  return { total, count };
}

    planTeethMap.platinum = JSON.parse(JSON.stringify(itemTeethMap));

    planMemos.platinum = memo;
    if (planItems.gold.length === 0) planItems.gold = [];

  } else if (m === 'simple' && mode === 'compare') {
    // 編集中プランの内容をシンプルに反映（空なら現状維持）
    const src = planItems[activePlan].length > 0 ? activePlan : 'platinum';

      const item = planItems[plan.id].find(i => i.id === id);
      if (item) {
        h += `<td class="col-${plan.id}" style="color:#2a8a7d;font-weight:600">✓ ×${item.qty}<br><span style="font-size:10px;color:#64748b">¥${fmt(item.price * item.qty)}</span></td>`;
      } else {
        h += `<td class="col-${plan.id}" style="color:#cbd5e1">—</td>`;
      }
    });
    h += '</tr>';
  });

  if (allItemIds.size === 0) {
    h += `<tr><td colspan="4" style="text-align:center;padding:20px;color:#94a3b8">プランに項目を追加してください</td></tr>`;
  }

  // Totals
  h += '<tr class="compare-total"><td style="font-weight:700">合計（税込）</td>';
  PLANS.forEach(plan => {
    const { total } = getPlanTotal(plan.id);
    h += `<td class="col-${plan.id}" style="font-weight:700;color:#2a8a7d">¥${fmt(total)}</td>`;
  });
  h += '</tr>';

  // Refund row
  h += '<tr><td>還付目安</td>';
  PLANS.forEach(plan => {
    const { total } = getPlanTotal(plan.id);
    const refund = calcRefund(total, otherMedical, insuranceReimbursement, annualIncome);
    h += `<td class="col-${plan.id}" style="color:#e67e22;font-weight:600">${total > 0 ? '-¥' + fmt(refund.totalRefund) : '—'}</td>`;
  });
  h += '</tr>';

  // Net cost row
  h += '<tr><td>実質負担額</td>';
  PLANS.forEach(plan => {
    const { total } = getPlanTotal(plan.id);
    const refund = calcRefund(total, otherMedical, insuranceReimbursement, annualIncome);
    h += `<td class="col-${plan.id}" style="font-weight:700;color:#92400e">${total > 0 ? '¥' + fmt(total - refund.totalRefund) : '—'}</td>`;
  });
  h += '</tr>';

  h += '</tbody></table>';
  return h;
}

    items.forEach(item => {
      const badge = item.custom ? '<span style="background:#fef3c7;color:#92400e;font-size:10px;padding:1px 6px;border-radius:4px;margin-left:6px">自由入力</span>' : '';
      ded += `<div class="row" style="padding:6px 0;border-bottom:1px solid #f1f5f9"><span style="flex:1">${esc(item.name)}${badge}${item.qty > 1 ? ' <span style="color:#64748b">×' + item.qty + '</span>' : ''}</span><span style="font-weight:600;flex-shrink:0">¥${fmt(item.price * item.qty)}</span></div>`;
    });
    ded += `<div class="row" style="padding-top:8px;margin-top:4px;border-top:2px solid #e2e8f0"><span style="font-weight:700;color:#2a8a7d">合計</span><span style="font-weight:700;color:#2a8a7d">¥${fmt(total)}</span></div></div></div>`;
  }

  ded += `<div style="font-size:11px;color:#94a3b8;line-height:1.6">
    ※ 上記は概算です。実際の金額は個人の状況により異なります。<br>
    ※ 給与所得控除・基礎控除のみ考慮した簡易計算です。<br>
    ※ 年収は仮設定です。正確な還付額は税理士等にご相談ください。<br>
    ※ 医療費控除の上限は200万円です。</div>`;

  document.getElementById('page-deduction').innerHTML = ded;

  // ===== 印刷用見積書 =====
  if (mode === 'compare') {
    renderPrintViewCompare();
  } else {
    renderPrintView(total, count, refund);
  }
}

function renderPrintView(total, count, refund) {
  const dateStr = planDate ? planDate.replace(/-/g, '/').replace(/^(\d{4})\/(\d{1,2})\/(\d{1,2})$/, (m,y,mo,d) => `${y}年${parseInt(mo)}月${parseInt(d)}日`) : '';
  const taxExcl = Math.round(total / 1.1);
  const tax = total - taxExcl;

  let chart = `<div style="text-align:center"><div class="pe-chart-title">歯 式 図</div>${buildDentalChart(true)}</div>`;

  let rows = '';
  selectedItems.forEach(item => {
    const teeth = (itemTeethMap[item.id] || []);
    const teethStr = teeth.length > 0 ? `<div style="font-size:8px;color:#2a8a7d">${teeth.map(t=>toothLabel(t)).join(', ')}</div>` : '';
    rows += `<tr><td>${esc(item.name)}${item.custom ? ' <span style="font-size:8px;color:#92400e">[自由]</span>' : ''}${teethStr}</td>
      <td class="center">${item.qty}</td><td class="num">¥${fmt(item.price)}</td><td class="num">¥${fmt(item.price * item.qty)}</td></tr>`;
  });
  for (let i = selectedItems.length; i < 8; i++) rows += '<tr class="empty-row"><td></td><td></td><td></td><td></td></tr>';

  let pe = '';
  pe += `<div style="text-align:center;margin-bottom:8px"><img src="あづみのロゴ.png" style="height:40px" alt="あづみのうえはら おとなこども歯科"></div>`;
  pe += `<div class="pe-meta">
    <div><div class="pe-patient">${patientName ? esc(patientName) + ' 様' : '　　　　　　　　 様'}</div></div>
    <div class="pe-info-right">
      <div>作成日: <span>${dateStr || '　　年　　月　　日'}</span></div>
      <div>担当医: <span>${doctorName ? esc(doctorName) : '　　　　　　'}</span></div>
    </div></div>`;

  pe += `<div class="pe-total-box"><div class="pe-total-label">お見積り合計金額（税込）</div><div class="pe-total-amount">¥${fmt(total)}</div></div>`;

  pe += `<div class="pe-body"><div class="pe-chart-col">${chart}</div>
    <div class="pe-table-col"><table class="pe-table">
      <thead><tr><th style="width:auto">内容</th><th style="width:36px">数量</th><th style="width:72px">金額</th><th style="width:80px">小計</th></tr></thead>
      <tbody>${rows}
        <tr class="sum-row"><td colspan="3" style="text-align:right">税抜き合計</td><td class="num">¥${fmt(taxExcl)}</td></tr>
        <tr class="sum-row"><td colspan="3" style="text-align:right">消費税（10%）</td><td class="num">¥${fmt(tax)}</td></tr>
        <tr class="total-row"><td colspan="3" style="text-align:right">税込み合計</td><td class="num">¥${fmt(total)}</td></tr>
      </tbody></table></div></div>`;

  if (total > 0 && refund.totalRefund > 0) {
    pe += `<div class="pe-deduction"><h3>医療費控除シミュレーション（参考・年収は仮設定）</h3>
      <div class="pe-ded-grid">
        <div class="pe-ded-row"><span>年収設定</span><span>${fmt(annualIncome/10000)}万円（仮）</span></div>
        <div class="pe-ded-row"><span>所得税率</span><span>${(refund.rate*100).toFixed(0)}%</span></div>
        <div class="pe-ded-row"><span>医療費控除額</span><span>¥${fmt(refund.cappedDeduction)}</span></div>
        <div class="pe-ded-row"><span>所得税還付</span><span style="font-weight:700;color:#e67e22">¥${fmt(refund.incomeTax)}</span></div>
        <div class="pe-ded-row"><span>住民税軽減</span><span style="font-weight:700;color:#e67e22">¥${fmt(refund.residentTax)}</span></div>
      </div>
      <div class="pe-ded-highlight">合計還付・軽減目安: ¥${fmt(refund.totalRefund)}</div></div>`;
    pe += `<div class="pe-net-box"><div class="pe-net-label">医療費控除後の実質負担額（参考）</div><div class="pe-net-amount">¥${fmt(total - refund.totalRefund)}</div></div>`;
  }

  if (memo) pe += `<div><div class="pe-memo-label">備考</div><div class="pe-memo">${esc(memo).replace(/\n/g,'<br>')}</div></div>`;

  pe += `<div class="pe-notes">※ 表示価格はすべて税込です。医療費控除は簡易シミュレーションであり、実際の還付額は年収等により異なります。<br>
    ※ 本見積は現時点での診断に基づいて作成しております。治療の進行状況やお口の状態の変化により、治療内容および費用が変更となる場合がございます。<br>
    ※ 追加処置が必要となった場合は別途費用が発生することがあります。</div>`;
  pe += `<div class="pe-footer"><div>有効期限: 発行日より3ヶ月</div><div style="text-align:right">あづみのうえはら おとなこども歯科</div></div>`;

  document.getElementById('print-estimate').innerHTML = pe;
}

function renderPrintViewCompare() {
  const dateStr = planDate ? planDate.replace(/-/g, '/').replace(/^(\d{4})\/(\d{1,2})\/(\d{1,2})$/, (m,y,mo,d) => `${y}年${parseInt(mo)}月${parseInt(d)}日`) : '';

  let pe = '';
  pe += `<div style="text-align:center;margin-bottom:8px"><img src="あづみのロゴ.png" style="height:40px" alt="あづみのうえはら おとなこども歯科"></div>`;
  pe += `<div class="pe-meta">
    <div><div class="pe-patient">${patientName ? esc(patientName) + ' 様' : '　　　　　　　　 様'}</div></div>
    <div class="pe-info-right">
      <div>作成日: <span>${dateStr || '　　年　　月　　日'}</span></div>
      <div>担当医: <span>${doctorName ? esc(doctorName) : '　　　　　　'}</span></div>
    </div></div>`;

  pe += `<div style="text-align:center;font-size:14px;font-weight:700;margin-bottom:10px;color:#3a9e8f">3プラン比較見積書</div>`;

  // Build print comparison table
  const allItemIds = new Map();
  PLANS.forEach(plan => {
    planItems[plan.id].forEach(item => {
      allItemIds.set(item.id, item.name);
    });
  });

  pe += '<table class="pe-compare-table">';
  pe += '<thead><tr><th style="text-align:left">内容</th>';
  PLANS.forEach(plan => {
    pe += `<th>${plan.icon} ${plan.label}</th>`;
  });
  pe += '</tr></thead><tbody>';

  allItemIds.forEach((name, id) => {
    pe += '<tr>';
    pe += `<td>${esc(name)}</td>`;
    PLANS.forEach(plan => {
      const item = planItems[plan.id].find(i => i.id === id);
      if (item) {
        pe += `<td>✓ ×${item.qty} (¥${fmt(item.price * item.qty)})</td>`;
      } else {
        pe += `<td style="color:#ccc">—</td>`;
      }
    });
    pe += '</tr>';
  });

  // Totals
  pe += '<tr class="compare-total"><td style="font-weight:700">合計（税込）</td>';
  PLANS.forEach(plan => {
    const { total } = getPlanTotal(plan.id);
    pe += `<td style="font-weight:700">¥${fmt(total)}</td>`;
  });
  pe += '</tr>';

  // Refund row
  pe += '<tr><td>還付目安</td>';
  PLANS.forEach(plan => {
    const { total } = getPlanTotal(plan.id);
    const refund = calcRefund(total, otherMedical, insuranceReimbursement, annualIncome);
    pe += `<td style="color:#e67e22;font-weight:600">${total > 0 ? '-¥' + fmt(refund.totalRefund) : '—'}</td>`;
  });
  pe += '</tr>';

  // Net cost
  pe += '<tr><td>実質負担額</td>';
  PLANS.forEach(plan => {
    const { total } = getPlanTotal(plan.id);
    const refund = calcRefund(total, otherMedical, insuranceReimbursement, annualIncome);
    pe += `<td style="font-weight:700">${total > 0 ? '¥' + fmt(total - refund.totalRefund) : '—'}</td>`;
  });
  pe += '</tr>';

  pe += '</tbody></table>';

  // Show memos for each plan
  PLANS.forEach(plan => {
    if (planMemos[plan.id]) {
      pe += `<div><div class="pe-memo-label">${plan.label} 備考</div><div class="pe-memo">${esc(planMemos[plan.id]).replace(/\n/g,'<br>')}</div></div>`;
    }
  });

  pe += `<div class="pe-notes" style="margin-top:8px">※ 表示価格はすべて税込です。医療費控除は簡易シミュレーションであり、実際の還付額は年収等により異なります。<br>
    ※ 年収${fmt(annualIncome/10000)}万円（仮）で試算しています。<br>
    ※ 本見積は現時点での診断に基づいて作成しております。治療の進行状況やお口の状態の変化により、治療内容および費用が変更となる場合がございます。</div>`;
  pe += `<div class="pe-footer"><div>有効期限: 発行日より3ヶ月</div><div style="text-align:right">あづみのうえはら おとなこども歯科</div></div>`;

  document.getElementById('print-estimate').innerHTML = pe;
}

render();

</script>
